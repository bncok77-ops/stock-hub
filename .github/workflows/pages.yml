name: Update GitHub Pages Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-data
  cancel-in-progress: true

jobs:
  update-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate market data
        run: npm run generate:data

      - name: Build static output
        run: |
          mkdir -p dist/api
          cp index.html app.js style.css .nojekyll dist/
          cp api/market-summary.json dist/api/market-summary.json

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
          commit_message: "Update market data"
