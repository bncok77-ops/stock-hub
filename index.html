<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHub | 시장 지표</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="ticker-bar" aria-label="실시간 주요 지표">
            <div class="ticker-track" id="ticker-track"></div>
        </div>
        <nav class="top-nav">
            <a class="brand" href="/" aria-label="StockHub 홈">StockHub</a>
            <div class="nav-links" aria-label="주요 메뉴">
                <a href="#dashboard">지수</a>
                <a href="/news">뉴스</a>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" type="button" aria-label="화면 테마 변경">다크</button>
            </div>
        </nav>
    </header>

    <main id="top">
        <section class="market-hero" id="dashboard">
            <div class="dashboard-head">
                <div>
                    <p class="eyebrow">Market Dashboard</p>
                    <h1>주요 지표</h1>
                </div>
                <div class="data-status" id="data-status" aria-live="polite">시장 데이터를 불러오는 중입니다.</div>
            </div>

            <div class="market-group">
                <h2>주요</h2>
                <div class="indicator-grid priority-grid" id="priority-indices"></div>
            </div>

            <div class="market-group">
                <h2>매크로</h2>
                <div class="indicator-grid" id="macro-indicators"></div>
            </div>

            <div class="market-group">
                <h2>미국 지표</h2>
                <div class="indicator-grid compact" id="us-indicators"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>StockHub의 시장 데이터는 공개 데이터 기반 참고 정보입니다. 실제 투자 판단 전 거래소와 증권사 공식 데이터를 확인하세요.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
