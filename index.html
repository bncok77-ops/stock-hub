<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHub | 국내 주식 뉴스와 시장 지표</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="ticker-bar" aria-label="실시간 주요 지표">
            <div class="ticker-track" id="ticker-track"></div>
        </div>
        <nav class="top-nav">
            <a class="brand" href="#top" aria-label="StockHub 홈">StockHub</a>
            <div class="nav-links" aria-label="주요 메뉴">
                <a href="#dashboard">지표</a>
                <a href="#news">뉴스</a>
                <a href="#calendar">날짜별</a>
                <a href="#themes">테마</a>
            </div>
            <div class="nav-actions">
                <input id="search-input" type="search" placeholder="종목, 테마, 뉴스 검색">
                <button id="theme-toggle" type="button" aria-label="화면 테마 변경">다크</button>
            </div>
        </nav>
    </header>

    <main id="top">
        <section class="market-hero" id="dashboard">
            <div class="dashboard-head">
                <div>
                    <p class="eyebrow">Market Dashboard</p>
                    <h1>주요 지표</h1>
                </div>
                <div class="data-status" id="data-status" aria-live="polite">시장 데이터를 불러오는 중입니다.</div>
            </div>

            <div class="market-group">
                <h2>주요</h2>
                <div class="indicator-grid priority-grid" id="priority-indices"></div>
            </div>

            <div class="market-group">
                <h2>매크로</h2>
                <div class="indicator-grid" id="macro-indicators"></div>
            </div>

            <div class="market-group">
                <h2>미국 전일</h2>
                <div class="indicator-grid compact" id="us-indicators"></div>
            </div>
        </section>

        <section class="workspace">
            <section class="news-panel" id="news">
                <div class="section-title-row">
                    <div>
                        <p class="eyebrow">News</p>
                        <h2>국내 주식 뉴스</h2>
                    </div>
                    <div class="segmented-control" aria-label="뉴스 정렬 방식">
                        <button type="button" class="active" data-view="timeline">시간순</button>
                        <button type="button" data-view="date">날짜별</button>
                    </div>
                </div>

                <div class="filter-row" aria-label="뉴스 필터">
                    <button type="button" class="active" data-filter="all">전체</button>
                    <button type="button" data-filter="stock">종목</button>
                    <button type="button" data-filter="theme">테마</button>
                    <button type="button" data-filter="market">시장</button>
                    <button type="button" data-filter="global">해외</button>
                </div>

                <div id="news-list" class="news-list" aria-live="polite"></div>
            </section>

            <aside class="side-rail">
                <section class="rail-panel" id="themes">
                    <div class="panel-header">
                        <h3>테마 카테고리</h3>
                        <span>국내 종목 기준</span>
                    </div>
                    <div class="theme-list" id="theme-list"></div>
                </section>

                <section class="rail-panel">
                    <div class="panel-header">
                        <h3>종목 카테고리</h3>
                        <span>뉴스 연결</span>
                    </div>
                    <div class="stock-list" id="stock-list"></div>
                </section>
            </aside>
        </section>

        <section class="calendar-section" id="calendar">
            <div class="section-title-row">
                <div>
                    <p class="eyebrow">Daily Brief</p>
                    <h2>날짜별 뉴스 묶음</h2>
                </div>
            </div>
            <div id="date-groups" class="date-groups"></div>
        </section>
    </main>

    <footer>
        <p>StockHub의 시장 데이터는 무료 공개 엔드포인트 기반 참고 정보입니다. 실제 투자 판단 전 거래소, 증권사, 공식 통계기관의 원천 데이터를 확인해야 합니다.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
