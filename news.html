<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHub | 뉴스</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <nav class="top-nav">
            <a class="brand" href="/" aria-label="StockHub 홈">StockHub</a>
            <div class="nav-links" aria-label="주요 메뉴">
                <a href="/">지수</a>
                <a href="/news">뉴스</a>
            </div>
            <div class="nav-actions">
                <input id="search-input" type="search" placeholder="종목, 테마, 뉴스 검색">
                <button id="theme-toggle" type="button" aria-label="화면 테마 변경">다크</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="news-panel standalone-news" id="news">
            <div class="section-title-row">
                <div>
                    <p class="eyebrow">News</p>
                    <h1>국내 주식 뉴스</h1>
                </div>
                <div class="segmented-control" aria-label="뉴스 정렬 방식">
                    <button type="button" class="active" data-view="timeline">시간순</button>
                    <button type="button" data-view="date">날짜별</button>
                </div>
            </div>

            <div class="filter-row" aria-label="뉴스 필터">
                <button type="button" class="active" data-filter="all">전체</button>
                <button type="button" data-filter="stock">종목</button>
                <button type="button" data-filter="theme">테마</button>
                <button type="button" data-filter="market">시장</button>
                <button type="button" data-filter="global">해외</button>
            </div>

            <div id="news-list" class="news-list" aria-live="polite"></div>
        </section>
    </main>

    <footer>
        <p>뉴스 영역은 시장 흐름을 빠르게 훑기 위한 참고 정보입니다.</p>
    </footer>

    <script src="news.js"></script>
</body>
</html>
